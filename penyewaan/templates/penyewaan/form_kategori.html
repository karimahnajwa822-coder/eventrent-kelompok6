{% extends 'penyewaan/base.html' %}
{% load static %}

{% block title %}
Tambah Kategori
{% endblock %}

{% block content %}

<style>

body{
    background:#f4f7fc;
    font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;
}

/* ================= HEADER ================= */

.page-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
    flex-wrap:wrap;
    gap:15px;
}

.page-title h2{
    color:#0d6efd;
    font-weight:700;
    margin-bottom:5px;
}

.page-title p{
    color:#6c757d;
    margin:0;
}

/* ================= CARD ================= */

.form-card{
    background:#ffffff;
    border:none;
    border-radius:18px;
    padding:35px;
    box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* ================= FORM ================= */

.form-label{
    font-weight:600;
    color:#495057;
}

.form-control,
.form-select{
    border-radius:12px;
    height:48px;
}

textarea.form-control{
    height:120px;
    resize:none;
}

/* ================= BUTTON ================= */

.btn{
    border-radius:10px;
    font-weight:600;
    padding:10px 22px;
}

.btn i{
    margin-right:6px;
}

</style>

<div class="container-fluid py-4">

    <!-- Header -->

    <div class="page-header">

        <div class="page-title">

            <h2>
                Tambah Kategori
            </h2>

            <p>
                Tambahkan kategori baru untuk mengelompokkan barang EventRent.
            </p>

        </div>

        <a href="{% url 'kategori' %}" class="btn btn-secondary">

            <i class="fas fa-arrow-left"></i>

            Kembali

        </a>

    </div>

    <!-- Card Form -->

    <div class="form-card">

        <form method="POST">

            {% csrf_token %}
<!-- ================= DATA KATEGORI ================= -->

<div class="row">

    <!-- Kode Kategori -->

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Kode Kategori
        </label>

        <input
            type="text"
            name="kode_kategori"
            class="form-control"
            value="KTG006"
            readonly>

    </div>

    <!-- Nama Kategori -->

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Nama Kategori
        </label>

        <input
            type="text"
            name="nama_kategori"
            class="form-control"
            placeholder="Masukkan nama kategori">

    </div>

    <!-- Status -->

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Status
        </label>

        <select
            name="status"
            class="form-select">

            <option selected>
                Aktif
            </option>

            <option>
                Tidak Aktif
            </option>

        </select>

    </div>

    <!-- Jumlah Barang -->

    <div class="col-md-6 mb-3">

        <label class="form-label">
            Jumlah Barang
        </label>

        <input
            type="number"
            name="jumlah_barang"
            class="form-control"
            value="0"
            readonly>

    </div>

    <!-- Deskripsi -->

    <div class="col-12 mb-3">

        <label class="form-label">
            Deskripsi Kategori
        </label>

        <textarea
            name="deskripsi"
            class="form-control"
            placeholder="Masukkan deskripsi kategori..."></textarea>

    </div>

</div>
<!-- ================= BUTTON ================= -->

<hr class="my-4">

<div class="d-flex justify-content-end gap-2 flex-wrap">

    <button
        type="reset"
        class="btn btn-outline-secondary">

        <i class="fas fa-rotate-left"></i>

        Reset

    </button>

    <a
        href="{% url 'kategori' %}"
        class="btn btn-danger"
        onclick="return confirm('Apakah Anda yakin ingin membatalkan?')">

        <i class="fas fa-times"></i>

        Batal

    </a>

    <button
        type="submit"
        class="btn btn-primary">

        <i class="fas fa-save"></i>

        Simpan Kategori

    </button>

</div>

</form>

</div>

</div>

<script>

// Konfirmasi saat form disimpan
document.querySelector("form").addEventListener("submit", function(e){

    const nama = document.querySelector("input[name='nama_kategori']").value;

    if(nama.trim() == ""){

        alert("Nama kategori harus diisi.");

        e.preventDefault();

        return;

    }

    alert("Kategori berhasil disimpan.");

});

</script>

{% endblock %}
