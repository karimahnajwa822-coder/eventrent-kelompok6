{% load static %}
<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrasi Dosen</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>

        body{
            background:#f4f7fc;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            font-family:'Segoe UI',sans-serif;
        }

        .register-card{
            width:100%;
            max-width:550px;
            background:white;
            border-radius:20px;
            padding:35px;
            box-shadow:0 15px 35px rgba(0,0,0,.08);
        }

        .register-card h2{
            color:#0d6efd;
            font-weight:bold;
            text-align:center;
            margin-bottom:10px;
        }

        .register-card p{
            text-align:center;
            color:#6c757d;
            margin-bottom:30px;
        }

        .form-label{
            font-weight:600;
        }

        .form-control{
            border-radius:10px;
            padding:10px;
        }

        .btn-primary{
            border-radius:10px;
            padding:12px;
            font-weight:600;
        }

    </style>

</head>

<body>

<div class="register-card">

    <h2>
        Registrasi Dosen
    </h2>

    <p>
        Silakan lengkapi data di bawah ini.
    </p>

    {% if messages %}

        {% for message in messages %}

            <div class="alert alert-success">

                {{ message }}

            </div>

        {% endfor %}

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">

            <label class="form-label">

                Username

            </label>

            <input
                type="text"
                name="username"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Email

            </label>

            <input
                type="email"
                name="email"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Password

            </label>

            <input
                type="password"
                name="password"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Nomor HP

            </label>

            <input
                type="text"
                name="no_hp"
                class="form-control"
                required>

        </div>

        <div class="mb-3">

            <label class="form-label">

                Alamat

            </label>

            <textarea
                name="alamat"
                rows="3"
                class="form-control"
                required></textarea>

        </div>

        <div class="d-grid mb-3">

            <button
                type="submit"
                class="btn btn-primary">

                <i class="fas fa-user-plus me-2"></i>

                Daftar

            </button>

        </div>

        <div class="text-center">

            Sudah memiliki akun?

            <a href="{% url 'login' %}">

                Login di sini

            </a>

        </div>

    </form>

</div>

</body>

</html>
