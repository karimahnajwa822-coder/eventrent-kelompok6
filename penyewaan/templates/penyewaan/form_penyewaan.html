{% extends 'penyewaan/base.html' %}
{% load static %}

{% block title %}Form Penyewaan{% endblock %}

{% block content %}

<div class="form-page">

    <div class="form-header">

        <div>
            <h1>Form Penyewaan</h1>
            <p>Silakan lengkapi data penyewaan peralatan.</p>
        </div>

    </div>

    <div class="form-card">

        <form>

            <div class="form-grid">

                <div class="form-group">
                    <label>Nama Pelanggan</label>
                    <input type="text" placeholder="Masukkan nama pelanggan">
                </div>

                <div class="form-group">
                    <label>No. Telepon</label>
                    <input type="text" placeholder="08xxxxxxxxxx">
                </div>

                <div class="form-group">
                    <label>Barang</label>

                    <select>
                        <option>Pilih Barang</option>
                        <option>Sound System</option>
                        <option>Tenda</option>
                        <option>Kursi VIP</option>
                        <option>Lighting</option>
                    </select>

                </div>

                <div class="form-group">
                    <label>Jumlah</label>
                    <input type="number">
                </div>

                <div class="form-group">
                    <label>Tanggal Sewa</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>Tanggal Kembali</label>
                    <input type="date">
                </div>

                <div class="form-group">
                    <label>Total Pembayaran</label>
                    <input type="text" placeholder="Rp 0">
                </div>

                <div class="form-group">
                    <label>Status</label>

                    <select>
                        <option>Diproses</option>
                        <option>Disewa</option>
                        <option>Selesai</option>
                    </select>

                </div>

            </div>

            <div class="form-group">

                <label>Alamat</label>

                <textarea rows="4"
                    placeholder="Masukkan alamat pelanggan"></textarea>

            </div>

            <div class="button-group">

                <button type="submit" class="btn-simpan">
                    Simpan
                </button>

                <button type="reset" class="btn-reset">
                    Reset
                </button>

                <button type="button" class="btn-batal">
                    Batal
                </button>

            </div>

        </form>

    </div>

</div>

{% endblock %}
